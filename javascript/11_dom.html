       <script>
//DOM 
//Document Object Model
//javascript로 수정이 가능한 대상
console.log(document)

//id 속성으로 DOM을 가져오기
const title = document.getElementById('title')
console.log(title)
console.log(''+title)

//없으면 null
const title2 = document.getElementById('title2')
console.log(title2)

//동일한 id가 있어도 첫번째 DOM만 가져온다
const View = document.getElementById('View')
console.log(View)

//tag로 찾기
let divs = document.getElementsByTagName('div')
console.log(divs)

//없으면 lenght가 0인 배열
let divs2 = document.getElementsByTagName('div2')
console.log(divs2)

if(divs2){
    console.log('참')
}

//class로 찾기

let menus = document.getElementsByClassName('menu')
console.log(menus)

let 메뉴 = document.getElementById('메뉴')
let pizza = 메뉴.getElementsByClassName('pizza')
console.log(pizza)

//querySelector
// css 선택자를 사용할 수 있다
//여러개인 경우 첫번째 DOM만 돌려준다
//없는 경우 null

let View2 = document.querySelector('#View.pizza')
console.log(View2)

let View3 =  document.querySelector('#View')
console.log(View3)

let View4 =  document.querySelector('#View4')
console.log(View4)

let qsa = document.querySelectorAll('#View')
console.log(qsa)



//////////////////////////////////

//////////////////////////////////

let aha = document.querySelector('#aha')
console.log(aha)
