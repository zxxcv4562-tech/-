<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css 실습</title>
<style>
    /*css 주석*/
    /*여러줄
     주석*/
/*전체 선택자*/
*{color: red;}
h2 {font-size: 300%;}
h1 {font-size: 300%;}

h1,h2 {font-size: 300%;}
/* ,로 구분해서 여러개 동시에 적용 가능*/
/* id 선택자*/
#li1 {color: black;}
.c1 {background-color: green;
}
.bigtext{font-size: 30px;
}
/* 속성 선택자 */
/* 속성이 존재한다면 */
[readonly]
{ background-color: yellow;}
[type=password] {background-color: pink;}

/* #li3은 [id=li3의 줄임말]*/
[id=li3] {border: 3px; }
/* ^ = 속성값이 시작하는것*/
[href^=https] {color:blue;}
/* $ = 속성값이 끝나는것*/
[href$=com] {font-size 40px; }
/* ~ = 띄어쓰기로 구분되는 값 */
[class~=bigtext] {color: white}
/* 딱 붙여서 쓰면 "그리고" 조건*/
h2.c1 {background-color:rgb(14,175,255)}
li.c1.c2 {background-color: yellowgreen;}

div strong{color: blue;}

div > strong{font-size: 40px;}

#div1:hover{background-color: yellow;
}
#div1:active{background-color: green;
}

.text1:focus{background-color: black;}

input[type=checkbox]:checked{
    width: 20px;
    height: 20px;
    }
input[type=checkbox]:checked + span{text-decoration: line-through;}

#ul1 > li:nth-child(4) {color:black;}

#ul1 > li:nth-child(2n+1){background-color: blueviolet;}

#ul1 li:not(.c3){font-size: 32px;}
/*선택자 앞 또는 뒤에 content 추가 및 css 적용*/
h3::before{content: "before"; color: black; font-size: 10px;}
h3::after{content: "after"; color: blue; font-size: 10px;}

::selection {background-color: aqua);
}
/* 우선순위
!important > style 속성 > #id > class = 속성 > 태그 >*전체 선택자 > 브라우저 기본값
동등한 우선순위일 때 
나중에 나온 것이 덮어 쓴다*/
#div2 {border: 1px solid aqua;}

.c4{border: 1px solid blue;  }

[humen]{border: 1px solid pink;}

.c4{border: 1px solid blue; !important;}
!
div{border: 1px solid red;}

#table .no{background-color: yellow;}
#table .title_{border-color:blue;}




</style>
</head>
<body>
<h1>hello world</h1>
<h2>부제목</h2>
<ul>
    <li id="li1" class="c1">li1</li>
    <li class="c1 bigtext c2">li2</li>
    <li id="li3">li3</li>
</ul>
<input type="text" readonly><br>
<input type="password"><br>
<a href="http://...">http</a><br>
<a href="https://...">https</a><br>
<a href="https://www.google.com/">구글</a>
<br>

<strong>밖에 있는 strong</strong>
<div>
    <strong>안에 있는 strong
    </strong>
</div>
<div>
    <a href="#">
    <strong>div 안에 a안에 있는 strong</strong>
    </a>

</div>
<hr>
<div id="div1">
호버연습
</div>
focus연습 : <input type="text" class="text1"><br>


<input type="checkbox">checked 연습
<br>
<input type="checkbox">checked 연습<br>
<input type="checkbox"><span>점심먹기</span>

<ul id="ul1">
    <li>1</li>
    <li>2</li>
    <li>3</li>
    <li class="c3">4</li>
    <li class="c3">5</li>
</ul>

<h3>비포 에프터 연습</h3>


<div class="c4" id="div2" humen="천안" style="border: 1px solid black;">우선순위 연습

</div>

<table id="table" border="1">
    <tr>
        <td class="no">N0.</td>
        <td class="title_">제목</td>
        <td>글쓴이</td>
    </tr>
    <tr>
        <td class="no">1</td>
        <td class="title_">제목1</td>
        <td>글쓴이1</td>
    </tr>
    <tr>
        <td class="no">2</td>
        <td class="title_">제목2</td>
        <td>글쓴이2</td>
    </tr>
</table>
